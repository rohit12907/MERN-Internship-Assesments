<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Information Form</title>
    <style>
        body{
            background-color:#f2f2f2;
            font-family: Georgia, serif;
        }

        .container{
            width:450px;
            margin:40px auto;
            padding:20px;
            background:white;
            border-radius:8px;
            box-shadow:0 0 5px rgba(0,0,0,0.2);
        }

        fieldset{
            border:1px solid black;
            padding:15px;
        }

        legend{
            font-size:24px;
        }

        label{
            display:block;
            margin-top:12px;
            margin-bottom:5px;
            font-size:18px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        textarea{
            width:95%;
            padding:10px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        .gender{
            margin-top:8px;
        }

        .gender label{
            display:inline;
            margin-right:20px;
            font-size:18px;
        }

        textarea{
            resize:none;
        }

        button{
            margin-top:20px;
            padding:10px 22px;
            font-size:18px;
            border:2px solid black;
            border-radius:4px;
            cursor:pointer;
            background:white;
        }

        button:hover{
            background:#eaeaea;
        }
    </style>
</head>
<body>

    <div class="container">
        <form>
            <fieldset>
                <legend>User personal information</legend>

                <label for="name">Enter your full name</label>
                <input type="text" id="name" value="Rahul Kumar">

                <label for="email">Enter your email</label>
                <input type="email" id="email" value="geeks@12345gmail.com">

                <label for="password">Enter your password</label>
                <input type="password" id="password">

                <label for="confirm">Confirm your password</label>
                <input type="password" id="confirm">

                <label>Enter your gender</label>
                <div class="gender">
                    <input type="radio" id="male" name="gender" checked>
                    <label for="male">Male</label>

                    <input type="radio" id="female" name="gender">
                    <label for="female">Female</label>

                    <input type="radio" id="other" name="gender">
                    <label for="other">Others</label>
                </div>

                <label for="dob">Enter your Date of Birth</label>
                <input type="date" id="dob" value="2009-10-06">

                <label for="address">Enter your Address:</label>
                <textarea id="address" rows="3">Noida Sector 137</textarea>

                <button type="submit">submit</button>
            </fieldset>
        </form>
    </div>

</body>
</html>
